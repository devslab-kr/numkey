<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>numkey — vanilla example</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 3rem auto; padding: 0 1rem; line-height: 1.6; }
    label { display: block; margin: 1.1rem 0 0.25rem; font-size: 0.9rem; color: #555; }
    input { font-size: 1.1rem; padding: 0.4rem 0.6rem; width: 15rem; }
    code { background: #f4f4f4; padding: 0.1rem 0.3rem; border-radius: 3px; }
    .numkey-korean { margin-left: 0.5rem; color: #0f766e; }
    .numkey-korean:not(:empty)::after { content: " 원"; color: #999; }
  </style>
</head>
<body>
  <h1>numkey · vanilla</h1>
  <p>Everything below is markup — <code>observe()</code> binds every <code>[data-numkey]</code>.</p>

  <label>Integer · <code>data-numkey</code></label>
  <input data-numkey value="1234567">

  <label>2 decimals · <code>data-numkey="2"</code></label>
  <input data-numkey="2" placeholder="1234.56">

  <label>Negative · <code>data-numkey-negative</code></label>
  <input data-numkey data-numkey-negative placeholder="-9999">

  <label>Clamped 0–10,000 on blur · <code>data-numkey-min/max</code></label>
  <input data-numkey data-numkey-min="0" data-numkey-max="10000" placeholder="99999 → 10,000">

  <label>Korean reading · <code>data-numkey-korean</code></label>
  <input data-numkey data-numkey-korean value="1500000">

  <label>Shorthand entry (try <code>3만5천</code> or <code>1.5억</code>, then blur) · <code>data-numkey-korean-entry</code></label>
  <input data-numkey data-numkey-korean-entry data-numkey-korean placeholder="3만5천">

  <script type="module" src="/src/main.js"></script>
</body>
</html>
